<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小学生心理健康测评系统</title>
    <style>
        :root {
            --primary: #4A90D9;
            --primary-dark: #357ABD;
            --secondary: #6C5CE7;
            --success: #2ECC71;
            --warning: #F39C12;
            --danger: #E74C3C;
            --bg: #F0F4F8;
            --card-bg: #FFFFFF;
            --text: #2C3E50;
            --text-light: #636E72;
            --border: #DFE6E9;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #E8F0FE 0%, #F0E6FF 25%, #FFF3E0 50%, #E8F5E9 75%, #E3F2FD 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text);
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        .navbar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 16px 28px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            flex-wrap: wrap;
            gap: 12px;
        }
        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
            cursor: pointer;
        }
        .navbar .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: all var(--transition);
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 4px 14px rgba(74, 144, 217, 0.35);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #fff;
            color: var(--primary);
            border: 2px solid var(--border);
        }
        .btn-secondary:hover {
            border-color: var(--primary);
            background: #F8FAFD;
            transform: translateY(-2px);
        }
        .btn-success {
            background: var(--success);
            color: #fff;
            box-shadow: 0 4px 14px rgba(46, 204, 113, 0.3);
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(46, 204, 113, 0.4);
        }
        .btn-danger {
            background: #fff;
            color: var(--danger);
            border: 2px solid #FADBD8;
        }
        .btn-danger:hover {
            background: #FDF2F2;
            border-color: var(--danger);
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 0.9rem;
            border-radius: 30px;
        }
        .btn-lg {
            padding: 14px 32px;
            font-size: 1.25rem;
            border-radius: 60px;
        }
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }
        .card-header {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #F0F4F8;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: inherit;
            transition: all var(--transition);
            background: #FAFBFC;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.1);
            background: #fff;
        }
        .question-section {
            margin-bottom: 24px;
            padding: 20px;
            background: linear-gradient(135deg, #FAFBFC 0%, #F8FAFD 100%);
            border-radius: var(--radius-sm);
            border-left: 4px solid var(--primary);
        }
        .section-title {
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 14px;
            color: var(--primary);
        }
        .question-item {
            margin-bottom: 14px;
            padding: 12px 16px;
            background: #fff;
            border-radius: var(--radius-sm);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }
        .q-text {
            font-weight: 500;
            margin-bottom: 8px;
        }
        .q-number {
            display: inline-block;
            width: 26px;
            height: 26px;
            line-height: 26px;
            text-align: center;
            background: var(--primary);
            color: #fff;
            border-radius: 50%;
            font-size: 0.8rem;
            font-weight: 700;
            margin-right: 6px;
        }
        .radio-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .radio-option {
            flex: 1;
            min-width: 100px;
        }
        .radio-option input[type="radio"] {
            display: none;
        }
        .radio-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 8px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all var(--transition);
            text-align: center;
            font-weight: 500;
            font-size: 0.9rem;
            background: #fff;
            user-select: none;
        }
        .radio-option label .emoji-opt {
            font-size: 1.8rem;
        }
        .radio-option input[type="radio"]:checked+label {
            border-color: var(--primary);
            background: #EBF5FB;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.12);
            font-weight: 700;
            color: var(--primary);
            transform: scale(1.03);
        }
        .result-hero {
            text-align: center;
            padding: 30px 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            color: #fff;
        }
        .result-hero.good {
            background: linear-gradient(135deg, #2ECC71, #27AE60);
        }
        .result-hero.normal {
            background: linear-gradient(135deg, #4A90D9, #357ABD);
        }
        .result-hero.attention {
            background: linear-gradient(135deg, #F39C12, #E67E22);
        }
        .result-hero.warning {
            background: linear-gradient(135deg, #E74C3C, #C0392B);
        }
        .result-hero .big-emoji {
            font-size: 4rem;
        }
        .result-hero .score {
            font-size: 3rem;
            font-weight: 800;
        }
        .result-hero .grade-text {
            font-size: 1.4rem;
            font-weight: 600;
            margin-top: 4px;
        }
        .dimension-bar {
            margin-bottom: 14px;
        }
        .dim-label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .bar-track {
            height: 22px;
            background: #E8ECF1;
            border-radius: 20px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            min-width: 40px;
            transition: width 0.6s ease;
        }
        .bar-fill.level-high {
            background: linear-gradient(90deg, #2ECC71, #27AE60);
        }
        .bar-fill.level-medium {
            background: linear-gradient(90deg, #F39C12, #E67E22);
        }
        .bar-fill.level-low {
            background: linear-gradient(90deg, #E74C3C, #C0392B);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th,
        table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #F0F4F8;
        }
        table th {
            background: #F8FAFD;
            font-weight: 700;
        }
        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
        }
        .badge-good {
            background: #D5F5E3;
            color: #1E8449;
        }
        .badge-normal {
            background: #D6EAF8;
            color: #1A5276;
        }
        .badge-attention {
            background: #FDEBD0;
            color: #935116;
        }
        .badge-warning {
            background: #FADBD8;
            color: #922B21;
        }
        .alert {
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            margin-bottom: 18px;
            font-weight: 500;
            animation: slideDown 0.4s ease;
        }
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .alert-success {
            background: #D5F5E3;
            color: #1E8449;
            border: 1px solid #ABEBC6;
        }
        .alert-error {
            background: #FADBD8;
            color: #922B21;
            border: 1px solid #F5B7B1;
        }
        .alert-info {
            background: #D6EAF8;
            color: #1A5276;
            border: 1px solid #AED6F1;
        }
        .feature-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        .feature-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            padding: 24px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
            color: var(--text);
            display: block;
        }
        .feature-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.15);
        }
        .feature-card .fc-icon {
            font-size: 3.5rem;
            margin-bottom: 12px;
            display: block;
        }
        .feature-card .fc-title {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 6px;
        }
        .feature-card .fc-desc {
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .card-student {
            border-top: 4px solid var(--success);
        }
        .card-teacher {
            border-top: 4px solid var(--primary);
        }
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-light);
            font-size: 0.8rem;
            margin-top: 20px;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }
            .card {
                padding: 18px;
            }
            .navbar {
                padding: 12px 16px;
                flex-direction: column;
                text-align: center;
            }
            .radio-group {
                flex-direction: column;
                gap: 8px;
            }
            .radio-option {
                min-width: auto;
            }
            .btn-lg {
                padding: 12px 24px;
                font-size: 1.1rem;
            }
            .feature-cards {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="logo" onclick="navigateTo('home')">🧠 小学生心理健康测评</div>
            <div class="nav-links" id="navLinks">
                <!-- 动态生成 -->
            </div>
        </nav>

        <!-- 消息提示区 -->
        <div id="messageBox"></div>

        <!-- 页面内容区 -->
        <div id="pageContent"></div>

        <!-- 页脚 -->
        <div class="footer">
            <p>🌟 关爱小学生心理健康 · 用心陪伴成长 🌟</p>
            <p style="margin-top:4px;">© 2024 小学生心理健康测评系统 | 仅供教育参考使用</p>
            <p style="margin-top:4px; font-size:0.7rem;">数据存储在浏览器本地</p>
        </div>
    </div>

    <script>
        // ---------- 全局数据 ----------
        const QUESTIONS = [
            { id: 1, text: "最近一周，你感到开心吗？", dimension: "情绪稳定性" },
            { id: 2, text: "你会因为一点小事就发脾气吗？", dimension: "情绪稳定性" },
            { id: 3, text: "晚上睡觉时，你容易入睡吗？", dimension: "情绪稳定性" },
            { id: 4, text: "你经常感到紧张或害怕吗？", dimension: "情绪稳定性" },
            { id: 5, text: "遇到不开心的事，你能很快调整过来吗？", dimension: "情绪稳定性" },
            { id: 6, text: "你觉得学习是一件有趣的事吗？", dimension: "学习适应性" },
            { id: 7, text: "上课时你能集中注意力听讲吗？", dimension: "学习适应性" },
            { id: 8, text: "完成作业时，你感到困难吗？", dimension: "学习适应性" },
            { id: 9, text: "遇到不会的题目，你会主动问老师或同学吗？", dimension: "学习适应性" },
            { id: 10, text: "你对自己的学习成绩满意吗？", dimension: "学习适应性" },
            { id: 11, text: "你愿意主动和同学一起玩吗？", dimension: "社交能力" },
            { id: 12, text: "在班上，你有好几个好朋友吗？", dimension: "社交能力" },
            { id: 13, text: "和同学发生矛盾时，你会主动和解吗？", dimension: "社交能力" },
            { id: 14, text: "你害怕在大家面前发言吗？", dimension: "社交能力" },
            { id: 15, text: "你觉得自己能和不同性格的同学相处吗？", dimension: "社交能力" },
            { id: 16, text: "你相信自己能把事情做好吗？", dimension: "自信心" },
            { id: 17, text: "当众受到表扬时，你心里是什么感觉？", dimension: "自信心" },
            { id: 18, text: "你觉得自己有很多优点吗？", dimension: "自信心" },
            { id: 19, text: "遇到困难时，你通常会怎么做？", dimension: "自信心" },
            { id: 20, text: "你觉得老师和父母相信你的能力吗？", dimension: "自信心" }
        ];
        const OPTIONS = [
            { value: 0, label: "从不", emoji: "😞" },
            { value: 1, label: "有时", emoji: "😐" },
            { value: 2, label: "经常", emoji: "😊" }
        ];

        // 模拟数据库存储
        let db = {
            users: [{ id: 1, username: 'admin', password: 'admin123' }],
            assessments: [],
            nextUserId: 2,
            nextAssessId: 1
        };

        // 从localStorage加载数据
        function loadDB() {
            const saved = localStorage.getItem('mentalHealthDB');
            if (saved) {
                try {
                    db = JSON.parse(saved);
                } catch (e) {
                    console.error('数据加载失败，使用默认数据');
                }
            }
        }
        // 保存数据到localStorage
        function saveDB() {
            localStorage.setItem('mentalHealthDB', JSON.stringify(db));
        }

        // 当前登录状态
        let currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');

        // 当前正在进行的测评信息（暂存）
        let currentAssessmentInfo = null;

        // ---------- 工具函数 ----------
        function showMessage(text, type = 'info') {
            const box = document.getElementById('messageBox');
            const types = { success: '✅', error: '❌', info: 'ℹ️' };
            box.innerHTML = `<div class="alert alert-${type}">${types[type] || ''} ${text}</div>`;
            setTimeout(() => { box.innerHTML = ''; }, 4000);
        }

        function navigateTo(page, params = null) {
            if (page === 'home') renderHome();
            else if (page === 'login') renderLogin();
            else if (page === 'assessment') renderAssessmentStart();
            else if (page === 'questions') renderQuestions();
            else if (page === 'result') renderResult(params);
            else if (page === 'dashboard') renderDashboard();
            else if (page === 'studentDetail') renderStudentDetail(params);
            updateNav();
        }

        function updateNav() {
            const navLinks = document.getElementById('navLinks');
            if (currentUser) {
                navLinks.innerHTML = `
                    <span style="font-size:0.9rem; color:var(--text-light);">👩‍🏫 ${currentUser.username}</span>
                    <button class="btn btn-primary btn-sm" onclick="navigateTo('dashboard')">📊 管理后台</button>
                    <button class="btn btn-danger btn-sm" onclick="logout()">退出登录</button>
                `;
            } else {
                navLinks.innerHTML = `
                    <button class="btn btn-success btn-sm" onclick="navigateTo('assessment')">📝 开始测评</button>
                    <button class="btn btn-secondary btn-sm" onclick="navigateTo('login')">🔐 教师登录</button>
                `;
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            showMessage('您已退出登录', 'info');
            navigateTo('home');
        }

        // ---------- 页面渲染函数 ----------
        function renderHome() {
            const page = document.getElementById('pageContent');
            page.innerHTML = `
                <div style="text-align:center; margin-bottom:20px;">
                    <h1 style="font-size:2rem; font-weight:800;">🌈 欢迎来到心理健康测评</h1>
                    <p style="color:var(--text-light); font-size:1.05rem;">关爱每一位孩子的内心世界，用科学的方式了解心理健康状态</p>
                </div>
                <div class="feature-cards">
                    <div class="feature-card card-student" onclick="navigateTo('assessment')">
                        <span class="fc-icon">📝</span>
                        <div class="fc-title">学生测评入口</div>
                        <div class="fc-desc">填写基本信息，完成测评问卷，获取评估报告</div>
                    </div>
                    <div class="feature-card card-teacher" onclick="navigateTo('login')">
                        <span class="fc-icon">👩‍🏫</span>
                        <div class="fc-title">教师管理后台</div>
                        <div class="fc-desc">查看学生测评记录，了解整体心理健康状况</div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">📋 测评说明</div>
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:16px;">
                        <div style="padding:14px; background:#F8FAFD; border-radius:10px;">
                            <strong>🎯 测评维度</strong>
                            <p style="margin-top:6px; font-size:0.9rem; color:var(--text-light);">情绪稳定性、学习适应性、社交能力、自信心，共20题</p>
                        </div>
                        <div style="padding:14px; background:#F8FAFD; border-radius:10px;">
                            <strong>⏱️ 预计时间</strong>
                            <p style="margin-top:6px; font-size:0.9rem; color:var(--text-light);">大约需要5-8分钟</p>
                        </div>
                        <div style="padding:14px; background:#F8FAFD; border-radius:10px;">
                            <strong>🔒 数据安全</strong>
                            <p style="margin-top:6px; font-size:0.9rem; color:var(--text-light);">数据保存在浏览器本地，仅授权教师可查看</p>
                        </div>
                        <div style="padding:14px; background:#F8FAFD; border-radius:10px;">
                            <strong>💡 温馨提示</strong>
                            <p style="margin-top:6px; font-size:0.9rem; color:var(--text-light);">本测评仅供参考，不能替代专业心理评估</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLogin() {
            if (currentUser) {
                showMessage('您已登录，将跳转到后台', 'info');
                navigateTo('dashboard');
                return;
            }
            const page = document.getElementById('pageContent');
            page.innerHTML = `
                <div class="card" style="max-width:450px; margin:40px auto;">
                    <div class="card-header">🔐 教师登录</div>
                    <form id="loginForm">
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" id="loginUsername" placeholder="请输入用户名" required>
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" id="loginPassword" placeholder="请输入密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">登录后台</button>
                    </form>
                    <p style="text-align:center; margin-top:14px; font-size:0.85rem; color:var(--text-light);">默认账号：admin / admin123</p>
                    <p style="text-align:center; margin-top:6px;"><a href="#" onclick="navigateTo('home')" style="color:var(--primary);">← 返回首页</a></p>
                </div>
            `;
            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value.trim();
                const user = db.users.find(u => u.username === username && u.password === password);
                if (user) {
                    currentUser = { id: user.id, username: user.username };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    showMessage('登录成功！', 'success');
                    navigateTo('dashboard');
                } else {
                    showMessage('用户名或密码错误', 'error');
                }
            });
        }

        function renderAssessmentStart() {
            const page = document.getElementById('pageContent');
            page.innerHTML = `
                <div class="card" style="max-width:550px; margin:20px auto;">
                    <div class="card-header">📝 学生基本信息</div>
                    <p style="color:var(--text-light); margin-bottom:18px;">请填写以下信息，然后开始心理健康测评。本测评共20道题，预计需要5-8分钟。</p>
                    <form id="startForm">
                        <div class="form-group">
                            <label>👤 学生姓名</label>
                            <input type="text" id="studentName" placeholder="请输入学生姓名" required maxlength="50">
                        </div>
                        <div class="form-group">
                            <label>⚧ 性别</label>
                            <select id="studentGender" required>
                                <option value="">请选择性别</option>
                                <option value="男">👦 男</option>
                                <option value="女">👧 女</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>📚 年级</label>
                            <select id="studentGrade" required>
                                <option value="">请选择年级</option>
                                <option value="一年级">一年级</option>
                                <option value="二年级">二年级</option>
                                <option value="三年级">三年级</option>
                                <option value="四年级">四年级</option>
                                <option value="五年级">五年级</option>
                                <option value="六年级">六年级</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success btn-lg" style="width:100%; justify-content:center;">开始测评 🚀</button>
                    </form>
                </div>
            `;
            document.getElementById('startForm').addEventListener('submit', function(e) {
                e.preventDefault();
                currentAssessmentInfo = {
                    name: document.getElementById('studentName').value.trim(),
                    gender: document.getElementById('studentGender').value,
                    grade: document.getElementById('studentGrade').value
                };
                navigateTo('questions');
            });
        }

        function renderQuestions() {
            if (!currentAssessmentInfo) {
                showMessage('请先填写基本信息', 'error');
                navigateTo('assessment');
                return;
            }
            const page = document.getElementById('pageContent');
            let html = `
                <div class="card">
                    <div class="card-header">✏️ 心理健康测评问卷 <span style="font-weight:400; font-size:0.9rem; color:var(--text-light);">（${currentAssessmentInfo.name} · ${currentAssessmentInfo.gender} · ${currentAssessmentInfo.grade}）</span></div>
                    <p style="color:var(--text-light); margin-bottom:16px;">请根据近期的实际情况，选择最符合的选项。答案没有对错之分。</p>
                    <form id="assessmentForm">
            `;
            // 情绪稳定性 (1-5)
            html += `<div class="question-section"><div class="section-title">😊 情绪稳定性</div>`;
            QUESTIONS.slice(0, 5).forEach(q => {
                html += renderQuestionHTML(q);
            });
            html += `</div>`;
            // 学习适应性 (6-10)
            html += `<div class="question-section"><div class="section-title">📖 学习适应性</div>`;
            QUESTIONS.slice(5, 10).forEach(q => {
                html += renderQuestionHTML(q);
            });
            html += `</div>`;
            // 社交能力 (11-15)
            html += `<div class="question-section"><div class="section-title">🤝 社交能力</div>`;
            QUESTIONS.slice(10, 15).forEach(q => {
                html += renderQuestionHTML(q);
            });
            html += `</div>`;
            // 自信心 (16-20)
            html += `<div class="question-section"><div class="section-title">💪 自信心</div>`;
            QUESTIONS.slice(15, 20).forEach(q => {
                html += renderQuestionHTML(q);
            });
            html += `</div>`;
            html += `
                        <button type="submit" class="btn btn-success btn-lg" style="width:100%; justify-content:center; margin-top:10px;">提交测评 📤</button>
                    </form>
                </div>
            `;
            page.innerHTML = html;

            document.getElementById('assessmentForm').addEventListener('submit', function(e) {
                e.preventDefault();
                // 收集答案
                const answers = {};
                let totalScore = 0;
                const dimensionScores = { "情绪稳定性": 0, "学习适应性": 0, "社交能力": 0, "自信心": 0 };
                let allAnswered = true;
                QUESTIONS.forEach(q => {
                    const radios = document.getElementsByName(`q_${q.id}`);
                    let selected = null;
                    for (let radio of radios) {
                        if (radio.checked) {
                            selected = parseInt(radio.value);
                            break;
                        }
                    }
                    if (selected === null) {
                        allAnswered = false;
                        showMessage(`请回答第 ${q.id} 题`, 'error');
                        return;
                    }
                    answers[q.id] = selected;
                    totalScore += selected;
                    dimensionScores[q.dimension] += selected;
                });
                if (!allAnswered) return;

                // 评定等级
                let level;
                if (totalScore >= 32) level = "良好";
                else if (totalScore >= 24) level = "正常";
                else if (totalScore >= 16) level = "需要关注";
                else level = "亟需关注";

                // 保存记录
                const record = {
                    id: db.nextAssessId++,
                    name: currentAssessmentInfo.name,
                    gender: currentAssessmentInfo.gender,
                    grade: currentAssessmentInfo.grade,
                    totalScore: totalScore,
                    level: level,
                    dimensionScores: dimensionScores,
                    answers: answers,
                    createdAt: new Date().toISOString()
                };
                db.assessments.push(record);
                saveDB();

                currentAssessmentInfo = null; // 清除暂存
                navigateTo('result', record.id);
            });
        }

        function renderQuestionHTML(q) {
            let html = `
                <div class="question-item">
                    <div class="q-text"><span class="q-number">${q.id}</span> ${q.text}</div>
                    <div class="radio-group">
            `;
            OPTIONS.forEach(opt => {
                html += `
                    <div class="radio-option">
                        <input type="radio" name="q_${q.id}" id="q${q.id}_${opt.value}" value="${opt.value}" required>
                        <label for="q${q.id}_${opt.value}">
                            <span class="emoji-opt">${opt.emoji}</span> ${opt.label}
                        </label>
                    </div>
                `;
            });
            html += `</div></div>`;
            return html;
        }

        function renderResult(assessId) {
            const record = db.assessments.find(a => a.id === assessId);
            if (!record) {
                showMessage('记录不存在', 'error');
                navigateTo('home');
                return;
            }
            let resultCss, resultEmoji;
            if (record.level === "良好") { resultCss = "good";
                resultEmoji = "🌟"; } else if (record.level === "正常") { resultCss = "normal";
                resultEmoji = "😊"; } else if (record.level === "需要关注") { resultCss = "attention";
                resultEmoji = "⚠️"; } else { resultCss = "warning";
                resultEmoji = "🔴"; }

            let dimsHTML = '';
            for (let dim in record.dimensionScores) {
                const score = record.dimensionScores[dim];
                const maxScore = 10;
                const percent = Math.min(100, Math.round(score / maxScore * 100));
                let cssClass;
                if (percent >= 75) cssClass = "level-high";
                else if (percent >= 50) cssClass = "level-medium";
                else cssClass = "level-low";
                const emojiMap = { "情绪稳定性": "😊", "学习适应性": "📖", "社交能力": "🤝", "自信心": "💪" };
                dimsHTML += `
                    <div class="dimension-bar">
                        <div class="dim-label">
                            <span>${emojiMap[dim] || '📊'} ${dim}</span>
                            <span>${score} / ${maxScore} 分</span>
                        </div>
                        <div class="bar-track">
                            <div class="bar-fill ${cssClass}" style="width: ${percent}%;">${percent}%</div>
                        </div>
                    </div>
                `;
            }

            let advice;
            if (record.level === "良好") advice = "整体心理健康状态良好，情绪稳定，适应能力较强。请继续保持积极心态，家长和老师可以适当给予鼓励和肯定。";
            else if (record.level === "正常") advice = "心理健康状态处于正常范围，个别维度可能略有波动。建议关注孩子的情绪变化，多沟通，培养兴趣爱好。";
            else if (record.level === "需要关注") advice = "部分维度得分偏低，可能存在一定的情绪困扰或适应困难。建议与孩子深入交流，必要时寻求学校心理老师的帮助。";
            else advice = "测评结果显示心理健康状态需要重点关注。建议立即与孩子进行耐心沟通，并联系专业心理辅导老师进行评估和干预。";

            const page = document.getElementById('pageContent');
            page.innerHTML = `
                <div class="result-hero ${resultCss}">
                    <div class="big-emoji">${resultEmoji}</div>
                    <div class="score">${record.totalScore} <span style="font-size:1.2rem;">/ 40</span></div>
                    <div class="grade-text">${record.level}</div>
                </div>
                <div class="card">
                    <div class="card-header">👤 学生信息</div>
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:12px;">
                        <div><strong>姓名：</strong>${record.name}</div>
                        <div><strong>性别：</strong>${record.gender || '-'}</div>
                        <div><strong>年级：</strong>${record.grade || '-'}</div>
                        <div><strong>测评日期：</strong>${new Date(record.createdAt).toLocaleDateString()}</div>
                    </div>
                </div>
                <div class="card">
                    <div class="card-header">📈 各维度得分</div>
                    ${dimsHTML}
                </div>
                <div class="card">
                    <div class="card-header">💡 评估建议</div>
                    <div style="padding:10px; line-height:1.8;">${advice}</div>
                </div>
                <div style="text-align:center; margin-top:10px; display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
                    <button class="btn btn-success" onclick="navigateTo('assessment')">再次测评</button>
                    <button class="btn btn-secondary" onclick="navigateTo('home')">返回首页</button>
                    ${currentUser ? '<button class="btn btn-primary" onclick="navigateTo(\'dashboard\')">返回后台</button>' : ''}
                </div>
            `;
        }

        function renderDashboard() {
            if (!currentUser) {
                showMessage('请先登录', 'error');
                navigateTo('login');
                return;
            }
            const students = db.assessments.slice().reverse(); // 最新的在前
            let tableRows = '';
            if (students.length > 0) {
                students.forEach((s, index) => {
                    let badgeClass;
                    if (s.level === "良好") badgeClass = "badge-good";
                    else if (s.level === "正常") badgeClass = "badge-normal";
                    else if (s.level === "需要关注") badgeClass = "badge-attention";
                    else badgeClass = "badge-warning";
                    tableRows += `
                        <tr>
                            <td>${index + 1}</td>
                            <td><strong>${s.name}</strong></td>
                            <td>${s.gender || '-'}</td>
                            <td>${s.grade || '-'}</td>
                            <td><strong>${s.totalScore}</strong> / 40</td>
                            <td><span class="badge ${badgeClass}">${s.level}</span></td>
                            <td>${new Date(s.createdAt).toLocaleDateString()}</td>
                            <td><button class="btn btn-primary btn-sm" onclick="navigateTo('studentDetail', ${s.id})">查看详情</button></td>
                        </tr>
                    `;
                });
            }
            const page = document.getElementById('pageContent');
            page.innerHTML = `
                <div class="card">
                    <div class="card-header">📊 教师管理后台</div>
                    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:18px;">
                        <button class="btn btn-success btn-sm" onclick="navigateTo('assessment')">+ 新增测评</button>
                        <button class="btn btn-secondary btn-sm" onclick="navigateTo('home')">← 返回首页</button>
                    </div>
                    <p style="color:var(--text-light); margin-bottom:14px;">共 <strong>${students.length}</strong> 条测评记录</p>
                </div>
                ${students.length > 0 ? `
                <div class="card" style="padding:0; overflow:hidden;">
                    <div style="overflow-x:auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>序号</th><th>姓名</th><th>性别</th><th>年级</th><th>总分</th><th>等级</th><th>日期</th><th>操作</th>
                                </tr>
                            </thead>
                            <tbody>${tableRows}</tbody>
                        </table>
                    </div>
                </div>` : `
                <div class="card" style="text-align:center; padding:40px;">
                    <span style="font-size:3rem;">📭</span>
                    <p style="color:var(--text-light); margin-top:10px;">暂无测评记录</p>
                    <button class="btn btn-success" style="margin-top:12px;" onclick="navigateTo('assessment')">开始第一次测评</button>
                </div>`}
            `;
        }

        function renderStudentDetail(assessId) {
            if (!currentUser) {
                showMessage('请先登录', 'error');
                navigateTo('login');
                return;
            }
            const record = db.assessments.find(a => a.id === assessId);
            if (!record) {
                showMessage('记录不存在', 'error');
                navigateTo('dashboard');
                return;
            }
            let dimsHTML = '';
            for (let dim in record.dimensionScores) {
                const score = record.dimensionScores[dim];
                const maxScore = 10;
                const percent = Math.min(100, Math.round(score / maxScore * 100));
                let cssClass = percent >= 75 ? "level-high" : percent >= 50 ? "level-medium" : "level-low";
                const emojiMap = { "情绪稳定性": "😊", "学习适应性": "📖", "社交能力": "🤝", "自信心": "💪" };
                dimsHTML += `
                    <div class="dimension-bar">
                        <div class="dim-label"><span>${emojiMap[dim] || '📊'} ${dim}</span><span>${score} / ${maxScore}</span></div>
                        <div class="bar-track"><div class="bar-fill ${cssClass}" style="width: ${percent}%;">${percent}%</div></div>
                    </div>`;
            }

            let answerRows = '';
            QUESTIONS.forEach(q => {
                const score = record.answers[q.id] || 0;
                const label = score === 2 ? "经常" : score === 1 ? "有时" : "从不";
                answerRows += `
                    <tr>
                        <td>${q.id}</td><td>${q.text}</td><td>${q.dimension}</td><td><strong>${score}</strong> / 2</td><td>${label}</td>
                    </tr>`;
            });

            let badgeClass;
            if (record.level === "良好") badgeClass = "badge-good";
            else if (record.level === "正常") badgeClass = "badge-normal";
            else if (record.level === "需要关注") badgeClass = "badge-attention";
            else badgeClass = "badge-warning";

            let advice = record.level === "良好" ? "整体心理健康状态良好。" :
                record.level === "正常" ? "心理健康状态处于正常范围，个别维度略有波动。" :
                record.level === "需要关注" ? "部分维度得分偏低，建议关注。" : "需要重点关注，联系专业老师。";

            const page = document.getElementById('pageContent');
            page.innerHTML = `
                <div class="card">
                    <div class="card-header">🔍 学生测评详情</div>
                    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:12px;">
                        <div><strong>姓名：</strong>${record.name}</div>
                        <div><strong>性别：</strong>${record.gender || '-'}</div>
                        <div><strong>年级：</strong>${record.grade || '-'}</div>
                        <div><strong>日期：</strong>${new Date(record.createdAt).toLocaleDateString()}</div>
                        <div><strong>总分：</strong>${record.totalScore} / 40</div>
                        <div><strong>等级：</strong><span class="badge ${badgeClass}">${record.level}</span></div>
                    </div>
                </div>
                <div class="card"><div class="card-header">📈 各维度得分详情</div>${dimsHTML}</div>
                <div class="card"><div class="card-header">📋 各题得分明细</div>
                    <div style="overflow-x:auto;"><table><thead><tr><th>题号</th><th>题目</th><th>维度</th><th>得分</th><th>类型</th></tr></thead><tbody>${answerRows}</tbody></table></div>
                </div>
                <div class="card"><div class="card-header">💡 建议</div><div style="padding:10px;">${advice}</div></div>
                <div style="text-align:center; margin-top:10px;">
                    <button class="btn btn-primary" onclick="navigateTo('dashboard')">← 返回后台列表</button>
                    <button class="btn btn-secondary" onclick="navigateTo('home')">返回首页</button>
                </div>
            `;
        }

        // ---------- 初始化 ----------
        function init() {
            loadDB();
            updateNav();
            // 默认显示首页
            navigateTo('home');
        }

        // 页面加载完成后执行
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
